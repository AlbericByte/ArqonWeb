      <h1>ArqonDB - Agent Memory Database for AI Agents</h1>
      <p>ArqonDB is an open-source agent memory database written in Rust. Give your AI agents persistent, explainable, searchable memory with causal graphs, temporal graphs, vector search, state branching, and distributed KV storage.</p>

      <h2>Agent Memory Features</h2>
      <ul>
        <li><strong>Distributed Key-Value Store</strong> - Sharded KV with gRPC API. Put, Get, Delete, Scan, BatchWrite across a distributed cluster.</li>
        <li><strong>LSM-Tree Storage Engine</strong> - Concurrent skip-list MemTable, prefix-compressed SST files, bloom filters, sharded LRU block cache, leveled compaction.</li>
        <li><strong>HNSW Vector Similarity Search</strong> - Built-in HNSW index with L2, cosine, and inner-product distance. Product Quantization (PQ) and Scalar Quantization (SQ) for large-scale.</li>
        <li><strong>Causal Reasoning Graph</strong> - DAG-based agent reasoning trace. Step types: Observe, Think, Act, Tool, Result. Edge types: Triggers, Informs, Branches, Merges. Full BFS traversal.</li>
        <li><strong>Temporal Graph</strong> - Time-aware edges with validity intervals [valid_from, valid_to]. Point-in-time traversal, range queries, edge expiration, and version history.</li>
        <li><strong>Agent State Fork &amp; Branch</strong> - Lightweight branching with copy-on-write overlays. Explore alternate reasoning paths. Atomic merge back.</li>
        <li><strong>Raft Distributed Consensus</strong> - Single-threaded event loop. Separate metadata and data plane Raft groups.</li>
        <li><strong>Redis Protocol Compatible</strong> - RESP2-compatible TCP server. Any Redis client can connect directly.</li>
        <li><strong>Reactive State</strong> - Compare-and-swap with optimistic locking. Watch key prefixes for real-time gRPC notifications.</li>
        <li><strong>Multi-Language SDKs</strong> - Official gRPC clients for Python 3.9+, Rust 1.70+, Go 1.21+, Java 17+, and C++ 17+.</li>
        <li><strong>Management Web Console</strong> - Dashboard with cluster stats, shard topology, KV terminal, user management, Prometheus metrics.</li>
      </ul>

      <h2>Architecture</h2>
      <p>Three-tier distributed architecture: stateless Gateway (gRPC :9379, HTTP :9380, Redis :6379) routing to a Metadata Plane (Raft consensus for shard map, column families, node registry) and Data Plane (ShardEngine per node with LSM-tree, HNSW vector index, agent state column families, per-shard Raft). Storage engine components: WAL with CRC32 checksums, MemTable with skip-list MVCC, SST files with bloom filters and compression (Zstd, Snappy, LZ4), sharded LRU block cache, leveled k-way merge compaction.</p>

      <h2>Performance vs RocksDB</h2>
      <h3>In-Memory (10K pairs, 20B keys, 100B values, WAL enabled)</h3>
      <ul>
        <li>Sequential Write: ArqonDB 5.39ms vs RocksDB 33.40ms — 6.2x faster</li>
        <li>Batch Write (100/batch): ArqonDB 4.05ms vs RocksDB 4.57ms — on par</li>
        <li>Sequential Read: ArqonDB 4.10ms vs RocksDB 9.62ms — 2.3x faster</li>
        <li>Random Read: ArqonDB 5.42ms vs RocksDB 9.24ms — 1.7x faster</li>
      </ul>
      <h3>Flush-to-SST (100K pairs, 20B keys, 1KB values, 4MB write buffer)</h3>
      <ul>
        <li>Sequential Write + Flush: ArqonDB 100.11ms vs RocksDB 483.00ms — 4.8x faster</li>
        <li>Batch Write + Flush: ArqonDB 133.46ms vs RocksDB 103.45ms — RocksDB 1.3x faster</li>
        <li>Point Read After Flush: ArqonDB 115.07ms vs RocksDB 157.44ms — 1.4x faster</li>
      </ul>
      <p>920+ tests, 64,000+ lines of Rust, 132+ PRs merged.</p>

      <h2>AgentStateService - Core Agent Memory API</h2>
      <p>The AgentStateService provides purpose-built primitives for AI agent memory: Causal Graph records reasoning traces as DAGs with Observe/Think/Act/Tool/Result steps and Triggers/Informs/Branches/Merges edges. Temporal Graph adds time-aware edges with validity intervals, point-in-time traversal (traverse_at), range queries (traverse_in_window), edge expiration, and version history (edge_history). Fork &amp; Branch enables lightweight state branching with copy-on-write overlays for exploring alternate reasoning paths. Reactive State provides CAS writes and prefix watch notifications. Similarity Search uses find_similar_chains for KNN on reasoning step embeddings to let agents learn from past experience.</p>

      <h2>Demo: Quantitative Trading Agent powered by AgentStateService</h2>
      <p>A production demo (Arqon) showcases ArqonDB's agent memory capabilities in a quantitative trading pipeline. The AgentStateService records the full agent lifecycle: (1) Observe steps for market data ingestion across 6,800+ NASDAQ symbols and news sentiment analysis; (2) Think steps for AI signal generation using 200+ technical indicators and 10,000+ alpha factors; (3) Similarity search on 64-dimensional pattern vectors to find historically similar market conditions; (4) Act steps for trade execution planning; (5) Result steps for portfolio tracking; (6) Fork branches for exploring alternative trading strategies. The causal graph provides complete audit trails and explainability.</p>

      <h2>SDKs &amp; Protocols</h2>
      <p>Official gRPC clients: Python 3.9+, Rust 1.70+, Go 1.21+, Java 17+, C++ 17+. Redis RESP2 protocol compatible — connect with redis-cli or any Redis client library.</p>

      <h2>Deployment</h2>
      <p>Single Node (cargo run), Docker (multi-stage build), Kubernetes (StatefulSet with 3+ data nodes), macOS launchd.</p>

      <p>Open source, Apache 2.0 licensed. <a href="https://github.com/AlbericByte/ArqonDB">View on GitHub</a>.</p>
